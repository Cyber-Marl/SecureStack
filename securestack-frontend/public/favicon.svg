<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Black left curly brace -->
  <text x="2" y="72" font-family="Georgia, serif" font-size="90" font-weight="900" fill="#111111">{</text>
  
  <!-- Orange right curly brace -->
  <text x="58" y="72" font-family="Georgia, serif" font-size="90" font-weight="900" fill="#F07020">}</text>

  <!-- Black S (back layer) -->
