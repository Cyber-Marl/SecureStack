name: 🤖 Auto-Generate & Publish Blog Article

on:
  # Run every Tuesday at 08:00 UTC (10:00 AM Harare time)
  schedule:
    - cron: '0 8 * * 2'

  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to generate (leave blank for automatic rotation)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate-and-publish:
    name: Generate Article with Gemini AI & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Setup Node ─────────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ── 3. Generate article via Gemini AI ────────────────────────────────────
      - name: 🤖 Generate Blog Article via Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/workflows/scripts/generate-article.js

      # ── 4. Read generated article summary ────────────────────────────────────
      - name: 📋 Read Article Summary
        id: summary
        run: |
          if [ -f generated_article_summary.txt ]; then
            SUMMARY=$(cat generated_article_summary.txt)
            TITLE=$(echo "$SUMMARY" | cut -d'|' -f1)
            SLUG=$(echo "$SUMMARY" | cut -d'|' -f3)
            CATEGORY=$(echo "$SUMMARY" | cut -d'|' -f5)
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            echo "category=$CATEGORY" >> $GITHUB_OUTPUT
          fi

      # ── 5. Commit updated blogData.js ─────────────────────────────────────────
      - name: 📝 Commit New Article
        run: |
          git config --global user.name "SecureStack Bot"
          git config --global user.email "bot@securestack.co.zw"
          git add securestack-frontend/src/data/blogData.js
          git diff --staged --quiet || git commit -m "feat(blog): auto-publish '${{ steps.summary.outputs.title }}' [${{ steps.summary.outputs.category }}]"

      # ── 6. Write Production .env ───────────────────────────────────────────
      - name: ⚙️ Write Production .env File
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
        run: |
          cat > securestack-backend/.env.production << EOF
          DEBUG=False
          SECRET_KEY=${SECRET_KEY:-securestack-prod-secret-key-change-me}
          ALLOWED_HOSTS=securestack.co.zw,www.securestack.co.zw,hz4.vps.webdevworld.com
          EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
          EMAIL_HOST=${EMAIL_HOST:-mail.securestack.co.zw}
          EMAIL_PORT=${EMAIL_PORT:-587}
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=${EMAIL_HOST_USER:-info@securestack.co.zw}
          EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
          DEFAULT_FROM_EMAIL=${EMAIL_HOST_USER:-info@securestack.co.zw}
          CONTACT_RECIPIENT_EMAIL=info@securestack.co.zw
          EOF
          sed -i 's/^[[:space:]]*//' securestack-backend/.env.production
          echo "✅ Production .env written."

      # ── 6b. Zip backend with production env ───────────────────────────────────
      - name: 📦 Zip Backend with Production Env
        run: |
          cd securestack-backend
          zip -r ../securestack-frontend/public/backend.zip . -x "venv/*" "db.sqlite3" ".env" "__pycache__/*" "*/__pycache__/*" "debug_path.txt" "pip_install.log"
          cd ..
          zip securestack-frontend/public/backend.zip securestack-backend/.env.production

      # ── 7. Install frontend dependencies ──────────────────────────────────────
      - name: 📦 Install Frontend Dependencies
        working-directory: securestack-frontend
        run: npm install

      # ── 8. Build React App ────────────────────────────────────────────────────
      - name: 🔨 Build React App
        working-directory: securestack-frontend
        run: npm run build

      # ── 8. Deploy to cPanel ───────────────────────────────────────────────────
      - name: 🚀 Deploy to cPanel Server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: node .github/workflows/scripts/cpanel-deploy.js

      # ── 9. Push the committed article back to main ────────────────────────────
      - name: ⬆️ Push Article Commit to main
        run: git push origin HEAD:main
