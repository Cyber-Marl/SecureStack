name: 🚀 Build & Deploy to cPanel

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Build React & Deploy via cPanel API
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Install Dependencies ────────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: securestack-frontend
        run: npm install

      # ── 4. Build React App ─────────────────────────────────────────────────
      - name: 🔨 Build React App
        working-directory: securestack-frontend
        run: npm run build

      # ── 5. Package dist into tar.gz ────────────────────────────────────────
      - name: 📦 Package dist folder
        run: |
          cd securestack-frontend/dist
          tar -czf ../../deploy.tar.gz .
          echo "✅ Package size: $(du -sh ../../deploy.tar.gz | cut -f1)"

      # ── 6. Upload tar.gz to server via cPanel File Manager API ─────────────
      - name: 📤 Upload archive to server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Uploading deploy.tar.gz to cPanel..."

          HTTP_STATUS=$(curl -s -o response_upload.txt -w "%{http_code}" \
            --max-time 120 \
            -k \
            -u "${CPANEL_USER}:${CPANEL_PASS}" \
            -F "dir=/public_html" \
            -F "file-1=@deploy.tar.gz;type=application/x-gzip" \
            "https://hz4.vps.webdevworld.com:2083/execute/Fileman/upload_files")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response_upload.txt

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Upload failed — trying with token auth..."

            HTTP_STATUS2=$(curl -s -o response_upload2.txt -w "%{http_code}" \
              --max-time 120 \
              -k \
              -H "Authorization: cpanel ${CPANEL_USER}:${{ secrets.CPANEL_API_TOKEN }}" \
              -F "dir=/public_html" \
              -F "file-1=@deploy.tar.gz;type=application/x-gzip" \
              "https://hz4.vps.webdevworld.com:2083/execute/Fileman/upload_files")

            echo "Token auth HTTP Status: $HTTP_STATUS2"
            cat response_upload2.txt

            if [ "$HTTP_STATUS2" != "200" ]; then
              echo "❌ Both auth methods failed"
              exit 1
            fi
            HTTP_STATUS=$HTTP_STATUS2
          fi

          echo "✅ Upload succeeded (HTTP $HTTP_STATUS)"

      # ── 7. Extract archive on server ───────────────────────────────────────
      - name: 📂 Extract archive on server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Extracting on server..."

          HTTP_STATUS=$(curl -s -o response_extract.txt -w "%{http_code}" \
            --max-time 60 \
            -k \
            -u "${CPANEL_USER}:${CPANEL_PASS}" \
            -G \
            --data-urlencode "destdir=/public_html" \
            --data-urlencode "file=/public_html/deploy.tar.gz" \
            "https://hz4.vps.webdevworld.com:2083/execute/Fileman/extract_an_archive")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response_extract.txt

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Extraction failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Extraction complete!"

      # ── 8. Cleanup archive from server ─────────────────────────────────────
      - name: 🧹 Cleanup deploy archive
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl -s -k \
            -u "${CPANEL_USER}:${CPANEL_PASS}" \
            -G \
            --data-urlencode "path=/public_html" \
            --data-urlencode "names-0=deploy.tar.gz" \
            "https://hz4.vps.webdevworld.com:2083/execute/Fileman/delete_files" > /dev/null
          echo "✅ Cleanup done. Deployment complete! 🎉"
