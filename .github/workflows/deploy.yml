name: 🚀 Build & Deploy to cPanel

on:
  push:
    branches:
      - main
      - master

permissions:
  statuses: write

jobs:
  build-and-deploy:
    name: Build React & Deploy via cPanel API
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Install Dependencies ────────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: securestack-frontend
        run: npm install

      # ── 4. Build React App ─────────────────────────────────────────────────
      - name: 🔨 Build React App
        working-directory: securestack-frontend
        run: npm run build

      # ── 5. Package dist into tar.gz ────────────────────────────────────────
      - name: 📦 Package dist folder
        run: |
          cd securestack-frontend/dist
          tar -czf ../../deploy.tar.gz .
          echo "✅ Package size: $(du -sh ../../deploy.tar.gz | cut -f1)"

      # ── 6. Run robust Node.js Deployer ─────────────────────────────────────
      - name: 🚀 Deploy to cPanel Server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: node .github/workflows/scripts/cpanel-deploy.js

      # ── 7. Publish Deploy Status and Logs ──────────────────────────────────
      - name: 📢 Publish Status & Log URL
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f deploy.log ]; then
            # Upload log to termbin.com
            LOG_URL=$(cat deploy.log | nc termbin.com 9999 | tr -d '\r\n')
            echo "📋 Log URL: $LOG_URL"
            
            # Extract last line (or error message) from log
            ERROR_MSG=$(grep "ERROR:" deploy.log | tail -n 1 | sed 's/ERROR: //' | cut -c 1-130)
            if [ -z "$ERROR_MSG" ]; then
              ERROR_MSG="Deployment finished with status: ${{ job.status }}"
            fi
            
            # Post status to GitHub Commit Status API
            STATUS_STATE="success"
            if [ "${{ job.status }}" != "success" ]; then
              STATUS_STATE="failure"
            fi
            
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              -d "{\"state\": \"$STATUS_STATE\", \"target_url\": \"$LOG_URL\", \"description\": \"$ERROR_MSG\", \"context\": \"Deployment Log Channel\"}"
          fi
