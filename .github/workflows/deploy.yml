name: 🚀 Deploy to cPanel via API

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger cPanel Git Deployment
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Trigger cPanel Deployment
        run: |
          echo "🔄 Calling cPanel UAPI to trigger git deployment..."

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" \
            --max-time 60 \
            -X POST "https://hz4.vps.webdevworld.com:2083/execute/VersionControl/deploy" \
            -H "Authorization: cpanel securest:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/securest/SecureStack")

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "HTTP Status Code: $HTTP_STATUS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "API Response:"
          cat response.txt
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Check for success - cPanel returns errors array
          if echo "$(cat response.txt)" | grep -q '"errors":null'; then
            echo "✅ Deployment triggered successfully!"
          elif echo "$(cat response.txt)" | grep -q '"status":1'; then
            echo "✅ Deployment triggered successfully!"
          else
            echo "❌ Deployment may have failed. Check response above."
            if [ "$HTTP_STATUS" != "200" ]; then
              exit 1
            fi
          fi
