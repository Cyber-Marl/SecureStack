name: 🚀 Deploy to cPanel via API

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger cPanel Git Deployment
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Trigger cPanel Deployment
        run: |
          echo "🔄 Calling cPanel UAPI (plain GET, no body)..."

          # URL-encode the path manually
          REPO_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('/home/securest/SecureStack'))")
          echo "Encoded path: $REPO_PATH"

          HTTP_STATUS=$(curl -v -o response.txt -w "%{http_code}" \
            --max-time 60 \
            "https://hz4.vps.webdevworld.com:2083/execute/VersionControl/deploy?repository_root=$REPO_PATH" \
            -H "Authorization: cpanel securest:${{ secrets.CPANEL_API_TOKEN }}" \
            -H "Accept: application/json") 2>&1 || true

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "HTTP Status Code: $HTTP_STATUS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Response:"
          cat response.txt || true
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Success!"
          else
            echo "⚠️ HTTP $HTTP_STATUS — switching to fallback PHP webhook approach"
          fi
