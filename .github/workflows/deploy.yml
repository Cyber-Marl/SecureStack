name: 🚀 Build & Deploy to cPanel

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build React & Deploy via cPanel API
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ── 3. Install Dependencies ────────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: securestack-frontend
        run: npm install

      # ── Write Production .env ──────────────────────────────────────────────
      - name: ⚙️ Write Production .env File
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
        run: |
          cat > securestack-backend/.env.production << EOF
          DEBUG=False
          SECRET_KEY=${SECRET_KEY:-securestack-prod-secret-key-change-me}
          ALLOWED_HOSTS=securestack.co.zw,www.securestack.co.zw,hz4.vps.webdevworld.com
          EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
          EMAIL_HOST=${EMAIL_HOST:-mail.securestack.co.zw}
          EMAIL_PORT=${EMAIL_PORT:-587}
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=${EMAIL_HOST_USER:-info@securestack.co.zw}
          EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
          DEFAULT_FROM_EMAIL=${EMAIL_HOST_USER:-info@securestack.co.zw}
          CONTACT_RECIPIENT_EMAIL=info@securestack.co.zw
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' securestack-backend/.env.production
          echo "✅ Production .env written:"
          # Print without showing password
          grep -v 'PASSWORD' securestack-backend/.env.production

      # ── Zip Backend ────────────────────────────────────────────────────────
      - name: 📦 Zip Backend Folder
        run: |
          cd securestack-backend
          # Include .env.production as .env inside the zip
          zip -r ../securestack-frontend/public/backend.zip . -x "venv/*" "db.sqlite3" ".env" "__pycache__/*" "*/__pycache__/*" "debug_path.txt" "pip_install.log" "deploy.log" "deploy.tar.gz" "generated_article_summary.txt"
          # Add the production env as .env in the zip
          cd ..
          zip securestack-frontend/public/backend.zip securestack-backend/.env.production
          echo "✅ backend.zip contents:"
          unzip -l securestack-frontend/public/backend.zip | tail -20

      # ── 4. Build React App ─────────────────────────────────────────────────
      - name: 🔨 Build React App
        working-directory: securestack-frontend
        run: npm run build

      # ── 5. Package dist into deploy.zip ────────────────────────────────────
      - name: 📦 Package dist folder (ZIP)
        run: |
          cd securestack-frontend/dist
          zip -r ../../deploy.zip .
          echo "✅ Package size: $(du -sh ../../deploy.zip | cut -f1)"

      # ── 6. Run robust Node.js Deployer ─────────────────────────────────────
      - name: 🚀 Deploy to cPanel Server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: node .github/workflows/scripts/cpanel-deploy.js

      # ── Trigger Backend Deploy Helper & Cleanup ───────────────────────
      - name: 🚀 Trigger Backend Deploy Helper & Cleanup
        continue-on-error: true
        run: |
          # Browser-like headers needed — OpenResty returns 415 for plain curl
          CURL_OPTS="-s --max-time 30
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
            -H 'User-Agent: Mozilla/5.0 (compatible; SecureStack-Deploy/1.0)'
            -H 'Cache-Control: no-cache'"

          # Retry helper: polls URL until HTTP 200 or gives up after max_attempts
          curl_with_retry() {
            local url="$1"
            local label="$2"
            local max_attempts=10
            local attempt=1
            local delay=8

            echo "⏳ Waiting for $label to become available..."
            while [ $attempt -le $max_attempts ]; do
              HTTP_STATUS=$(curl -o /tmp/curl_response.txt -w "%{http_code}" \
                -s --max-time 30 \
                -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
                -H "User-Agent: Mozilla/5.0 (compatible; SecureStack-Deploy/1.0)" \
                -H "Cache-Control: no-cache" \
                "$url")
              BODY=$(cat /tmp/curl_response.txt)

              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✅ [$label] HTTP $HTTP_STATUS — success on attempt $attempt"
                echo "--- Server Response ---"
                echo "$BODY"
                echo "-----------------------"
                return 0
              else
                echo "⚠️  [$label] HTTP $HTTP_STATUS on attempt $attempt/$max_attempts. Retrying in ${delay}s..."
                if [ -n "$BODY" ]; then
                  echo "   Response: $(echo "$BODY" | head -3)"
                fi
                sleep $delay
              fi
              attempt=$((attempt + 1))
            done

            echo "❌ [$label] Failed after $max_attempts attempts. Last HTTP status: $HTTP_STATUS"
            echo "--- Last Response ---"
            echo "$BODY"
            echo "--------------------"
            return 1
          }

          echo "🚀 Step 1: Triggering backend ZIP extraction..."
          curl_with_retry "https://securestack.co.zw/deploy_backend.php" "deploy_backend.php"

          echo ""
          echo "🧹 Step 2: Cleaning up diagnose.php..."
          # delete_diagnose.php self-deletes, so 404 is fine (already gone)
          HTTP=$(curl -o /tmp/diag_resp.txt -w "%{http_code}" \
            -s --max-time 15 \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "User-Agent: Mozilla/5.0 (compatible; SecureStack-Deploy/1.0)" \
            "https://securestack.co.zw/delete_diagnose.php")
          if [ "$HTTP" = "200" ]; then
            echo "✅ delete_diagnose.php ran successfully."
          else
            echo "ℹ️  delete_diagnose.php returned HTTP $HTTP (may already be deleted — that's fine)."
          fi

      # ── 7. Commit and Push Deploy Log ──────────────────────────────────────
      - name: 📝 Commit Deploy Log
        if: always()
        run: |
          if [ -f deploy.log ]; then
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add deploy.log
            git commit -m "chore: update deployment log [skip ci]" || echo "No changes to commit"
            git push origin HEAD:${{ github.ref }} || echo "Push failed"
          fi
