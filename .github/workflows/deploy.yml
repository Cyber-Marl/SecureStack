name: 🚀 Deploy to cPanel via API

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger cPanel Git Deployment
    runs-on: ubuntu-latest

    steps:
      # 1. Trigger cPanel to pull latest code and run .cpanel.yml
      - name: 📡 Trigger cPanel Deployment
        run: |
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -X POST "https://hz4.vps.webdevworld.com:2083/execute/VersionControl/deploy" \
            -H "Authorization: cpanel securest:${{ secrets.CPANEL_API_TOKEN }}" \
            -d "repository_root=/home/securest/SecureStack")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Deployment failed with HTTP $RESPONSE"
            exit 1
          fi

          echo "✅ cPanel deployment triggered successfully!"
