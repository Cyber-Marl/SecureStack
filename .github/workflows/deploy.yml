name: Build & Deploy to cPanel

# Force rebuild/redeploy trigger
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js for frontend building
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: securestack-frontend/package-lock.json

      # 3. Install frontend dependencies & build React app
      - name: 🛠️ Build React Frontend
        run: |
          cd securestack-frontend
          npm install
          npm run build

      # 4. Create the cPanel Passenger restart trigger file
      # Touching securestack-backend/tmp/restart.txt tells the cPanel Python server to reload.
      - name: 🔄 Create Restart Trigger for Django
        run: |
          mkdir -p securestack-backend/tmp
          touch securestack-backend/tmp/restart.txt

      # 5. Deploy Frontend to public_html (via SFTP/SSH)
      - name: 🚀 Deploy Frontend to public_html
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './securestack-frontend/dist/'
          remote_path: './public_html/'
          rsyncArgs: '--exclude=.git'

      # 6. Deploy Backend to securestack-backend (via SFTP/SSH)
      - name: 🚀 Deploy Backend to securestack-backend
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './securestack-backend/'
          remote_path: './securestack-backend/'
          rsyncArgs: '--exclude=venv --exclude=db.sqlite3 --exclude=.env --exclude=.git'
