name: 🚀 Deploy to cPanel

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger cPanel Git Deployment
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Trigger cPanel to Pull & Deploy
        run: |
          REPO_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('/home/securest/SecureStack'))")

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" \
            --max-time 60 \
            "https://hz4.vps.webdevworld.com:2083/execute/VersionControl/deploy?repository_root=$REPO_PATH" \
            -H "Authorization: cpanel securest:${{ secrets.CPANEL_API_TOKEN }}" \
            -H "Accept: application/json")

          echo "HTTP Status: $HTTP_STATUS"
          cat response.txt

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Deployment API call failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          # Check cPanel returned success
          if cat response.txt | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status')==1 else 1)" 2>/dev/null; then
            echo "✅ cPanel deployment triggered successfully!"
          else
            echo "⚠️ API responded 200 but check cPanel Git Version Control for deployment status"
            cat response.txt
          fi
