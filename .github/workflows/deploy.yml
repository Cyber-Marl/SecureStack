name: 🚀 Build & Deploy to cPanel

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build React & Deploy via cPanel API
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Node ──────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Install Dependencies ────────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: securestack-frontend
        run: npm install

      # ── 4. Build React App ─────────────────────────────────────────────────
      - name: 🔨 Build React App
        working-directory: securestack-frontend
        run: npm run build

      # ── 5. Package dist into tar.gz ────────────────────────────────────────
      - name: 📦 Package dist folder
        run: |
          cd securestack-frontend/dist
          tar -czf ../../deploy.tar.gz .
          echo "✅ Package size: $(du -sh ../../deploy.tar.gz | cut -f1)"

      # ── 6. Run robust Node.js Deployer ─────────────────────────────────────
      - name: 🚀 Deploy to cPanel Server
        env:
          CPANEL_USER: ${{ secrets.FTP_USERNAME }}
          CPANEL_PASS: ${{ secrets.FTP_PASSWORD }}
        run: node .github/workflows/scripts/cpanel-deploy.js

      # ── 7. Commit and Push Deploy Log ──────────────────────────────────────
      - name: 📝 Commit Deploy Log
        if: always()
        run: |
          if [ -f deploy.log ]; then
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add deploy.log
            git commit -m "chore: update deployment log [skip ci]" || echo "No changes to commit"
            git push origin HEAD:${{ github.ref }} || echo "Push failed"
          fi
