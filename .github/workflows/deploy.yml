name: 🚀 Deploy to cPanel via API

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Trigger cPanel Git Deployment
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Trigger cPanel Deployment
        run: |
          echo "🔄 Calling cPanel UAPI via GET to trigger git deployment..."

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" \
            --max-time 60 \
            -G "https://hz4.vps.webdevworld.com:2083/execute/VersionControl/deploy" \
            -H "Authorization: cpanel securest:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository_root=/home/securest/SecureStack")

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "HTTP Status Code: $HTTP_STATUS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "API Response:"
          cat response.txt
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ cPanel API responded with 200!"
          else
            echo "❌ HTTP $HTTP_STATUS - check response above"
            exit 1
          fi
